<app-header title = "Login"></app-header>

<ion-content>
  <div class="d-flex-center">
    <form [formGroup] ="form" class="auth-form" (ngSubmit)="submit()" (keypress.enter)="submit()">
      <app-custom-input 
      icon="mail-outline"
      autocomplete="email"
      [control] ="form.controls.email"
      type="email"
      label="email"
      ></app-custom-input>

      <div class ="validators" *ngIf="form.controls.email.errors && form.controls.email.touched">
        <div *ngIf="form.controls.email.errors?.['required']">Email is required</div>
        <div *ngIf="form.controls.email.errors['email']">Email is not valid</div>
      </div>

      <app-custom-input icon="lock-closed-outline"
      [control] ="form.controls.password"
      type="password"
      label="password"
      ></app-custom-input>
      <div class ="validators" *ngIf="form.controls.password.errors && form.controls.password.touched">
        <div *ngIf="form.controls.password.errors?.['required']">Password is required</div>
        </div>
      <ion-button expand="block" mode="ios" class="submit" type="submit" [disabled]="form.invalid">Login</ion-button>
      </form>
  </div>
</ion-content>
